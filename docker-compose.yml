services:

  postgresql:
    image: postgres:16
    environment:
      POSTGRES_USER: memos
      POSTGRES_PASSWORD: vishnu@memos@rag
      POSTGRES_DB: memos
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma

  api:
    build: .
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - postgresql
      - redis
      - chromadb

  worker:
    build: .
    command: celery -A workers.tasks worker --loglevel=info
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - postgresql
      - redis
      - chromadb

volumes:
  postgres_data:
  chroma_data:
